<!DOCTYPE html>
<html>
    <head>
        <title>Parei!</title>
    </head>
    <body style="font-family: monospace; text-align: center;">
        <table style="margin: auto; padding: 5px;">
            <tr>
                <td style="color: #000000; font-weight: 900;" id="now-datetime"></td>
            </tr>
            <tr>
                <td style="color: #AA3333; font-weight: 900;" id="since-datetime"></td>
            </tr>
            <tr>
                <td style="color: #33AA33; font-weight: 900;" id="diff-datetime"></td>
            </tr>
            <tr>
                <td style="height: 10px;" colspan="2"></td>
            </tr>
            <tr id="miliseconds-tr">
                <td id="miliseconds"></td>
            </tr>
            <tr id="seconds-tr">
                <td id="seconds"></td>
            </tr>
            <tr id="minutes-tr">
                <td id="minutes"></td>
            </tr>
            <tr id="hours-tr">
                <td id="hours"></td>
            </tr>
            <tr id="days-tr">
                <td id="days"></td>
            </tr>
            <tr id="weeks-tr">
                <td id="weeks"></td>
            </tr>
            <tr id="months-tr">
                <td id="months"></td>
            </tr>
            <tr id="years-tr">
                <td id="years"></td>
            </tr>
        </table>
        <script type="text/javascript" src="js/index.js"></script>
    </body>
</html>
